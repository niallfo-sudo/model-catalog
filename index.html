<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>3D Models Catalog</title>
<style>
:root{
  --bg:#0b0f14; --panel:rgba(255,255,255,.06); --panel2:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.12); --text:#e8eef7; --muted:#9fb0c3; --accent:#22c55e;
  --shadow:0 12px 34px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(1200px 700px at 10% 5%, rgba(34,197,94,.14), transparent 60%),
    radial-gradient(1200px 700px at 90% 10%, rgba(59,130,246,.12), transparent 60%),
    var(--bg);
}
a{color:inherit; text-decoration:none}
.header{
  position:sticky; top:0; z-index:10;
  background:rgba(11,15,20,.75); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  max-width:1400px; margin:0 auto; padding:12px 14px;
  display:flex; align-items:center; gap:12px; justify-content:space-between;
}
.brand{display:flex; align-items:center; gap:10px; font-weight:700}
.pill{font-size:12px; padding:5px 10px; border:1px solid rgba(34,197,94,.35); border-radius:999px; background:rgba(34,197,94,.10); color:var(--text)}
.kpis{display:flex; gap:14px; flex-wrap:wrap; color:var(--muted); font-size:12px}
.kpis strong{color:var(--text)}
.wrap{max-width:1400px; margin:0 auto; padding:14px; display:grid; grid-template-columns:330px 1fr; gap:14px}
@media (max-width:980px){.wrap{grid-template-columns:1fr}.sidebar{position:relative; top:auto; height:auto}}
.panel{background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow)}
.sidebar{position:sticky; top:74px; height:calc(100vh - 90px); overflow:auto}
.sidebar .inner{padding:12px}
.row{display:flex; gap:8px; align-items:center}
.search{width:100%; padding:10px 10px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,.20); color:var(--text); outline:none}
.select{width:100%; padding:10px 10px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,.20); color:var(--text); outline:none}
.section-title{margin:12px 0 8px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em}
.toc{display:flex; flex-direction:column; gap:8px; padding-bottom:10px}
.cat{
  border:1px solid var(--border); border-radius:14px; background:rgba(0,0,0,.18);
  overflow:hidden;
}
.cat-head{
  padding:10px 10px; display:flex; justify-content:space-between; align-items:center;
  cursor:pointer; user-select:none;
}
.cat-head:hover{background:rgba(255,255,255,.04)}
.badge{font-size:11px; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:2px 8px; background:rgba(255,255,255,.04)}
.subs{display:none; padding:6px 6px 10px}
.subs.open{display:block}
.sub{
  padding:8px 8px; display:flex; justify-content:space-between; align-items:center;
  border-radius:12px; cursor:pointer; color:var(--muted);
}
.sub:hover{background:rgba(255,255,255,.04); color:var(--text)}
.sub.active{background:rgba(34,197,94,.12); color:var(--text); border:1px solid rgba(34,197,94,.35)}
.main .inner{padding:14px}
.controls{display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:10px}
.btn{
  border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text);
  padding:9px 12px; border-radius:12px; cursor:pointer; font-size:13px;
}
.btn:hover{background:rgba(255,255,255,.10)}
.note{color:var(--muted); font-size:12px}
.grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px}
@media (max-width:1250px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:780px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:520px){.grid{grid-template-columns:1fr}}
.card{
  border:1px solid var(--border); border-radius:14px; overflow:hidden;
  background:rgba(0,0,0,.18); display:flex; flex-direction:column; min-height:175px;
}
.thumb{aspect-ratio:4/3; background:rgba(255,255,255,.04); position:relative}
.thumb img{width:100%; height:100%; object-fit:cover; display:block}
.thumb .noimg{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:12px; color:var(--muted)
}
.card-body{padding:10px; display:flex; flex-direction:column; gap:6px}
.title{font-size:13px; font-weight:650; line-height:1.2; max-height:3.2em; overflow:hidden}
.meta{font-size:11px; color:var(--muted); display:flex; gap:6px; flex-wrap:wrap}
.tag{border:1px solid var(--border); padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.04)}
.pager{display:flex; gap:8px; align-items:center; justify-content:center; margin-top:12px}
.pager .page{min-width:48px; text-align:center; padding:8px 10px; border:1px solid var(--border); border-radius:12px; background:rgba(0,0,0,.14)}
.error{margin:10px 0; padding:10px 12px; border-radius:14px; border:1px solid rgba(239,68,68,.35); background:rgba(239,68,68,.10); color:#ffd5d5; font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="pill">Catalog</span>
      <span>3D Models – Category / Subcategory</span>
    </div>
    <div class="kpis">
      <span>Total items: <strong id="kpiTotal">0</strong></span>
      <span>Shown: <strong id="kpiShown">0</strong></span>
      <span>Page: <strong id="kpiPage">1</strong></span>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="panel sidebar">
    <div class="inner">
      <input id="search" class="search" placeholder="Search title / model id..." />
      <div class="row" style="margin-top:10px">
        <select id="catSel" class="select"></select>
        <select id="subSel" class="select"></select>
      </div>

      <div class="section-title">Table of contents</div>
      <div id="toc" class="toc"></div>
    </div>
  </div>

  <div class="panel main">
    <div class="inner">
      <div class="controls">
        <div class="row">
          <button id="btnClear" class="btn">Clear filters</button>
          <button id="btnPrint" class="btn">Print / Save as PDF</button>
        </div>
        <div class="note">Click image or title to open the corresponding <b>drive_link</b>.</div>
      </div>

      <div id="errorBox" class="error" style="display:none"></div>
      <div id="grid" class="grid"></div>

      <div class="pager">
        <button id="prev" class="btn">Prev</button>
        <div class="page">Page <span id="pageNum">1</span> / <span id="pageMax">1</span></div>
        <button id="next" class="btn">Next</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const ALL = "ALL";
  const PAGE_SIZE = 48;

  const el = (id) => document.getElementById(id);
  const kpiTotal = el("kpiTotal");
  const kpiShown = el("kpiShown");
  const kpiPage = el("kpiPage");
  const search = el("search");
  const catSel = el("catSel");
  const subSel = el("subSel");
  const tocEl = el("toc");
  const grid = el("grid");
  const errorBox = el("errorBox");
  const pageNum = el("pageNum");
  const pageMax = el("pageMax");

  let DATA = null;
  let filtered = [];
  let page = 1;

  function dataUrl(){
    // Works for /model-catalog/ and /model-catalog/index.html
    return new URL("data.json", window.location.href).toString();
  }

  function showError(msg){
    errorBox.style.display = "block";
    errorBox.textContent = msg;
  }
  function clearError(){
    errorBox.style.display = "none";
    errorBox.textContent = "";
  }

  function normalize(s){ return (s || "").toString().toLowerCase(); }

  function buildSelects(){
    const cats = Object.keys(DATA.toc || {});
    catSel.innerHTML = "";
    subSel.innerHTML = "";

    const optAll = document.createElement("option");
    optAll.value = ALL; optAll.textContent = "All";
    catSel.appendChild(optAll);

    for (const c of cats){
      const o = document.createElement("option");
      o.value = c; o.textContent = c;
      catSel.appendChild(o);
    }

    const optAll2 = document.createElement("option");
    optAll2.value = ALL; optAll2.textContent = "All";
    subSel.appendChild(optAll2);
  }

  function rebuildSubSelect(){
    subSel.innerHTML = "";
    const optAll2 = document.createElement("option");
    optAll2.value = ALL; optAll2.textContent = "All";
    subSel.appendChild(optAll2);

    const c = catSel.value;
    if (c === ALL) return;

    const subs = Object.keys(DATA.toc[c] || {});
    for (const s of subs){
      const o = document.createElement("option");
      o.value = s; o.textContent = s;
      subSel.appendChild(o);
    }
  }

  function buildTOC(){
    tocEl.innerHTML = "";
    const entries = Object.entries(DATA.toc || {});
    for (const [cat, subMap] of entries){
      const total = Object.values(subMap).reduce((a,b)=>a+b,0);

      const wrap = document.createElement("div");
      wrap.className = "cat";

      const head = document.createElement("div");
      head.className = "cat-head";
      head.innerHTML = `<span>${escapeHtml(cat)}</span><span class="badge">${total.toLocaleString()}</span>`;

      const subs = document.createElement("div");
      subs.className = "subs";

      head.addEventListener("click", () => subs.classList.toggle("open"));

      for (const [sub, count] of Object.entries(subMap)){
        const row = document.createElement("div");
        row.className = "sub";
        row.innerHTML = `<span>${escapeHtml(sub)}</span><span class="badge">${count.toLocaleString()}</span>`;
        row.addEventListener("click", () => {
          catSel.value = cat;
          rebuildSubSelect();
          subSel.value = sub;
          applyFilters(true);
          // highlight
          [...tocEl.querySelectorAll(".sub")].forEach(x=>x.classList.remove("active"));
          row.classList.add("active");
          subs.classList.add("open");
        });
        subs.appendChild(row);
      }

      wrap.appendChild(head);
      wrap.appendChild(subs);
      tocEl.appendChild(wrap);
    }
  }

  function escapeHtml(str){
    return (str || "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  }

  function applyFilters(resetPage){
    if (!DATA) return;
    clearError();

    const q = normalize(search.value).trim();
    const cat = catSel.value;
    const sub = subSel.value;

    filtered = DATA.items.filter(it => {
      if (cat !== ALL && it.category !== cat) return false;
      if (sub !== ALL && it.subcategory !== sub) return false;
      if (!q) return true;
      const hay = normalize(it.title) + " " + normalize(it.model_id);
      return hay.includes(q);
    });

    if (resetPage) page = 1;

    // If a specific cat/sub yields zero, auto-fallback to ALL/ALL on first load
    if (filtered.length === 0 && (cat !== ALL || sub !== ALL) && !q){
      catSel.value = ALL;
      rebuildSubSelect();
      subSel.value = ALL;
      filtered = DATA.items.slice();
      page = 1;
    }

    render();
  }

  function openLink(it){
    const link = (it.drive_link || "").trim();
    if (link){
      window.open(link, "_blank", "noopener");
    } else {
      // fallback: open source url if drive link missing
      if (it.url) window.open(it.url, "_blank", "noopener");
    }
  }

  function render(){
    const total = DATA.items.length;
    const shown = filtered.length;

    kpiTotal.textContent = total.toLocaleString();
    kpiShown.textContent = shown.toLocaleString();

    const maxPage = Math.max(1, Math.ceil(shown / PAGE_SIZE));
    page = Math.min(Math.max(1, page), maxPage);
    kpiPage.textContent = page.toString();
    pageNum.textContent = page.toString();
    pageMax.textContent = maxPage.toString();

    const start = (page-1)*PAGE_SIZE;
    const slice = filtered.slice(start, start+PAGE_SIZE);

    grid.innerHTML = "";
    for (const it of slice){
      const card = document.createElement("div");
      card.className = "card";

      const thumb = document.createElement("div");
      thumb.className = "thumb";
      if (it.image_url){
        const img = document.createElement("img");
        img.src = it.image_url;
        img.alt = it.title || "thumbnail";
        img.loading = "lazy";
        img.addEventListener("click", ()=>openLink(it));
        img.style.cursor = "pointer";
        thumb.appendChild(img);
      } else {
        const no = document.createElement("div");
        no.className = "noimg";
        no.textContent = "No image";
        thumb.appendChild(no);
      }

      const body = document.createElement("div");
      body.className = "card-body";
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = it.title || "(untitled)";
      title.style.cursor = "pointer";
      title.addEventListener("click", ()=>openLink(it));

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <span class="tag">${escapeHtml(it.category)}</span>
        <span class="tag">${escapeHtml(it.subcategory)}</span>
        ${it.model_id ? `<span class="tag">ID: ${escapeHtml(it.model_id)}</span>` : ``}
        ${it.drive_link ? `<span class="tag" style="border-color:rgba(34,197,94,.45)">Drive</span>` : `<span class="tag">No drive link</span>`}
      `;

      body.appendChild(title);
      body.appendChild(meta);

      card.appendChild(thumb);
      card.appendChild(body);
      grid.appendChild(card);
    }
  }

  async function boot(){
    try{
      const res = await fetch(dataUrl(), {cache:"no-store"});
      if (!res.ok) throw new Error("HTTP " + res.status);
      DATA = await res.json();

      buildSelects();
      buildTOC();

      // Default state: show everything immediately
      catSel.value = ALL;
      rebuildSubSelect();
      subSel.value = ALL;
      filtered = DATA.items.slice();
      page = 1;
      render();
    }catch(e){
      showError("Failed to load data.json. Ensure data.json is in the same folder as index.html. Details: " + e.message);
      console.error(e);
    }
  }

  // Events
  search.addEventListener("input", ()=>applyFilters(true));
  catSel.addEventListener("change", ()=>{
    rebuildSubSelect();
    subSel.value = ALL;
    applyFilters(true);
  });
  subSel.addEventListener("change", ()=>applyFilters(true));

  el("btnClear").addEventListener("click", ()=>{
    search.value = "";
    catSel.value = ALL;
    rebuildSubSelect();
    subSel.value = ALL;
    applyFilters(true);
    [...tocEl.querySelectorAll(".sub")].forEach(x=>x.classList.remove("active"));
  });

  el("btnPrint").addEventListener("click", ()=>window.print());
  el("prev").addEventListener("click", ()=>{ page--; render(); });
  el("next").addEventListener("click", ()=>{ page++; render(); });

  boot();
})();
</script>
</body>
</html>
