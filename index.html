<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FOZE 3D</title>

<style>
:root{
  --bg:#0b0e14;
  --panel:#111827;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --border:rgba(255,255,255,.08);
  --accent:#22c55e;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  background:rgba(11,14,20,.9);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  z-index:10;
}

.header-inner{
  max-width:1500px;
  margin:auto;
  padding:12px 18px;
  display:flex;
  align-items:center;
}

.badge{
  font-size:13px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(34,197,94,.15);
  border:1px solid rgba(34,197,94,.35);
  font-weight:900;
}

.wrap{
  max-width:1500px;
  margin:auto;
  padding:14px;
  display:grid;
  grid-template-columns:300px 1fr;
  gap:14px;
}

@media(max-width:950px){
  .wrap{grid-template-columns:1fr}
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
}

.sidebar{
  position:sticky;
  top:70px;
  height:calc(100vh - 90px);
  overflow:auto;
}

.sidebar .inner{padding:12px}

.search{
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 10px;
  background:#0f172a;
}

.search input{
  width:100%;
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-size:13px;
}

.filters{
  display:flex;
  gap:8px;
  margin-top:10px;
}

select{
  width:100%;
  padding:8px;
  border-radius:10px;
  background:#0f172a;
  border:1px solid var(--border);
  color:var(--text);
  font-size:12px;
}

details{
  margin-bottom:6px;
  border-radius:10px;
  background:#0f172a;
  border:1px solid var(--border);
}

summary{
  padding:8px 10px;
  cursor:pointer;
  font-weight:700;
  list-style:none;
}

summary::-webkit-details-marker{display:none}

.subbtn{
  width:100%;
  padding:7px 10px;
  font-size:12px;
  background:none;
  border:none;
  color:var(--muted);
  text-align:left;
  cursor:pointer;
}

.subbtn:hover{color:white}

.main .inner{padding:12px}

.controls{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.btn{
  padding:7px 10px;
  font-size:12px;
  border-radius:10px;
  background:#0f172a;
  border:1px solid var(--border);
  color:white;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:8px;
}

@media(max-width:1300px){
  .grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:950px){
  .grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:650px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

.card{
  height:240px;
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#0f172a;
  cursor:pointer;
}

.thumb{
  aspect-ratio:4/3;
  overflow:hidden;
  background:#111827;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-body{
  padding:7px 8px;
  display:flex;
  flex-direction:column;
  gap:5px;
  flex:1;
}

.title{
  font-size:13px;
  font-weight:700;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  min-height:2.3em;
}

.meta{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  max-height:24px;
}

.chip{
  font-size:10px;
  padding:3px 7px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#111827;
  color:var(--muted);
}

.pagination{
  margin:12px 0;
  text-align:center;
}

.pagebox{
  display:inline-block;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  margin:0 6px;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="badge">FOZE 3D</div>
  </div>
</header>

<div class="wrap">
  <aside class="sidebar panel">
    <div class="inner">
      <div class="search">
        <input id="q" placeholder="Search title...">
      </div>

      <div class="filters">
        <select id="catSelect"></select>
        <select id="subSelect"></select>
      </div>

      <div id="toc"></div>
    </div>
  </aside>

  <main class="main panel">
    <div class="inner">

      <div class="controls">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn" onclick="window.print()">Print</button>
      </div>

      <!-- TOP PAGINATION -->
      <div class="pagination">
        <button class="btn" id="prevTop">Prev</button>
        <span class="pagebox" id="pageBoxTop">1</span>
        <button class="btn" id="nextTop">Next</button>
      </div>

      <div id="grid" class="grid"></div>

      <!-- BOTTOM PAGINATION -->
      <div class="pagination">
        <button class="btn" id="prevBottom">Prev</button>
        <span class="pagebox" id="pageBoxBottom">1</span>
        <button class="btn" id="nextBottom">Next</button>
      </div>

    </div>
  </main>
</div>

<script>
const PAGE_SIZE = 100;
let all = [];
let filtered = [];
let page = 1;

const qEl = document.getElementById("q");
const catSel = document.getElementById("catSelect");
const subSel = document.getElementById("subSelect");
const gridEl = document.getElementById("grid");
const tocEl = document.getElementById("toc");

const pageTop = document.getElementById("pageBoxTop");
const pageBottom = document.getElementById("pageBoxBottom");

function norm(s){return (s??"").toString().trim();}
function lower(s){return norm(s).toLowerCase();}
function cmp(a,b){return lower(a)<lower(b)?-1:lower(a)>lower(b)?1:0;}

function getTitle(i){return norm(i.title);}
function getCat(i){return norm(i.category);}
function getSub(i){return norm(i.subcategory);}
function getImg(i){return norm(i.image_url);}
function getDrive(i){return norm(i.drive_link);}

function sortAll(){
  all.sort((a,b)=>{
    let c=cmp(getCat(a),getCat(b));
    if(c) return c;
    c=cmp(getSub(a),getSub(b));
    if(c) return c;
    return cmp(getTitle(a),getTitle(b));
  });
}

function buildDropdowns(){
  const cats=[...new Set(all.map(getCat))].sort(cmp);
  catSel.innerHTML="<option value=''>All</option>";
  cats.forEach(c=>catSel.innerHTML+=`<option>${c}</option>`);
  updateSub();
}

function updateSub(){
  const cat=catSel.value;
  const subs=[...new Set(all.filter(i=>!cat||getCat(i)==cat).map(getSub))].sort(cmp);
  subSel.innerHTML="<option value=''>All</option>";
  subs.forEach(s=>subSel.innerHTML+=`<option>${s}</option>`);
}

function buildTOC(){
  const map={};
  all.forEach(i=>{
    const c=getCat(i)||"Other";
    const s=getSub(i)||"Other";
    if(!map[c]) map[c]=new Set();
    map[c].add(s);
  });

  Object.keys(map).sort(cmp).forEach(c=>{
    const d=document.createElement("details");
    const s=document.createElement("summary");
    s.textContent=c;
    d.appendChild(s);

    [...map[c]].sort(cmp).forEach(sub=>{
      const b=document.createElement("button");
      b.className="subbtn";
      b.textContent=sub;
      b.onclick=()=>{
        catSel.value=c;
        updateSub();
        subSel.value=sub;
        applyFilters();
      };
      d.appendChild(b);
    });

    tocEl.appendChild(d);
  });
}

function applyFilters(){
  const q=lower(qEl.value);
  const c=catSel.value;
  const s=subSel.value;

  filtered=all.filter(i=>{
    if(c && getCat(i)!=c) return false;
    if(s && getSub(i)!=s) return false;
    if(q && !lower(getTitle(i)).includes(q)) return false;
    return true;
  });

  filtered.sort((a,b)=>cmp(getTitle(a),getTitle(b)));
  page=1;
  render();
}

function render(){
  const max=Math.ceil(filtered.length/PAGE_SIZE)||1;
  page=Math.min(page,max);
  pageTop.textContent=page;
  pageBottom.textContent=page;

  gridEl.innerHTML="";
  filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE).forEach(i=>{
    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>{ if(getDrive(i)) window.open(getDrive(i),"_blank"); };

    const t=document.createElement("div");
    t.className="thumb";
    if(getImg(i)){
      const img=document.createElement("img");
      img.src=getImg(i);
      t.appendChild(img);
    }
    card.appendChild(t);

    const b=document.createElement("div");
    b.className="card-body";

    const title=document.createElement("div");
    title.className="title";
    title.textContent=getTitle(i);
    b.appendChild(title);

    const meta=document.createElement("div");
    meta.className="meta";

    const chip1=document.createElement("div");
    chip1.className="chip";
    chip1.textContent=getCat(i);
    meta.appendChild(chip1);

    const chip2=document.createElement("div");
    chip2.className="chip";
    chip2.textContent=getSub(i);
    meta.appendChild(chip2);

    b.appendChild(meta);
    card.appendChild(b);
    gridEl.appendChild(card);
  });
}

document.getElementById("prevTop").onclick=
document.getElementById("prevBottom").onclick=()=>{page--;render();};

document.getElementById("nextTop").onclick=
document.getElementById("nextBottom").onclick=()=>{page++;render();};

document.getElementById("clearBtn").onclick=()=>{
  qEl.value="";
  catSel.value="";
  subSel.value="";
  applyFilters();
};

qEl.oninput=applyFilters;
catSel.onchange=()=>{updateSub();applyFilters();};
subSel.onchange=applyFilters;

fetch("./data.json")
.then(r=>r.json())
.then(data=>{
  all=Array.isArray(data)?data:(data.items||[]);
  sortAll();
  buildDropdowns();
  buildTOC();
  filtered=[...all];
  render();
});
</script>

</body>
</html>
