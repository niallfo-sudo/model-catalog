<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>3D Models Catalog</title>
<style>
:root{--bg:#0b0e14;--panel:#111827;--panel2:#0f172a;--text:#e5e7eb;--muted:#9ca3af;--accent:#22c55e;--border:rgba(255,255,255,.10);--shadow:0 10px 30px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 800px at 20% 0%,rgba(34,197,94,.12),transparent 60%),radial-gradient(1200px 800px at 100% 30%,rgba(59,130,246,.10),transparent 60%),var(--bg);color:var(--text)}
a{color:inherit;text-decoration:none}a:hover{text-decoration:underline}
header{position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);background:rgba(11,14,20,.78);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;gap:12px;padding:14px 16px;max-width:1400px;margin:0 auto}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.25);border-radius:999px;font-size:12px;color:var(--text)}
.kpi{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.kpi span{font-size:12px;color:var(--muted)}.kpi strong{color:var(--text);font-weight:700}
.wrap{max-width:1400px;margin:0 auto;padding:14px 16px 18px;display:grid;grid-template-columns:320px 1fr;gap:14px}
.panel{background:linear-gradient(180deg,rgba(17,24,39,.90),rgba(15,23,42,.88));border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
.sidebar{position:sticky;top:70px;height:calc(100vh - 86px);overflow:auto}.sidebar .inner{padding:12px}
.search{display:flex;gap:8px;align-items:center;padding:10px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.15)}
.search input{width:100%;border:none;outline:none;background:transparent;color:var(--text);font-size:13px}
.selects{display:flex;gap:8px;margin-top:10px}
select{width:100%;border:1px solid var(--border);background:rgba(0,0,0,.18);color:var(--text);border-radius:12px;padding:10px;font-size:13px;outline:none}
.toc{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.toc h3{margin:0 0 10px 0;font-size:13px;color:var(--muted);font-weight:600}
.toc .cat{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.toc .cat>button{width:100%;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.12);border:none;color:var(--text);padding:10px;cursor:pointer;font-size:13px}
.toc .cat>button:hover{background:rgba(255,255,255,.06)}.toc .subs{padding:8px 10px;display:none}
.toc .subs a{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;color:var(--muted)}
.pill{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,.04)}
.main .inner{padding:14px}
.controls{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}
.controls .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:9px 12px;border-radius:12px;cursor:pointer;font-size:13px}
.btn:hover{background:rgba(255,255,255,.10)}.meta{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media (max-width:1250px){.wrap{grid-template-columns:300px 1fr}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:980px){.wrap{grid-template-columns:1fr}.sidebar{position:relative;top:auto;height:auto}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:520px){.grid{grid-template-columns:1fr}}
.card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:rgba(0,0,0,.16);min-height:170px;display:flex;flex-direction:column}
.thumb{position:relative;background:rgba(255,255,255,.04);aspect-ratio:4/3;overflow:hidden;cursor:default}
.thumb.clickable{cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.navBtn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.35);color:var(--text);cursor:pointer;user-select:none}
.navBtn:hover{background:rgba(0,0,0,.55)}.navPrev{left:8px}.navNext{right:8px}
.counter{position:absolute;bottom:8px;right:8px;font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--text);background:rgba(0,0,0,.35)}
.card .body{padding:10px 10px 11px;display:flex;flex-direction:column;gap:6px}
.title{font-size:12.5px;line-height:1.25;max-height:3.75em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.small{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;gap:8px}
.tag{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,.04)}
.pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px;flex-wrap:wrap}
.pager input{width:70px;border:1px solid var(--border);background:rgba(0,0,0,.15);color:var(--text);border-radius:10px;padding:8px 10px;outline:none;font-size:13px;text-align:center}

/* --- v2 visibility tweaks --- */
select, input[type="text"]{
  background: rgba(255,255,255,0.08) !important;
  border-color: rgba(255,255,255,0.35) !important;
  color: #fff !important;
}
select:focus, input[type="text"]:focus{
  outline: 2px solid rgba(255,255,255,0.45) !important;
  outline-offset: 2px !important;
}
select option{
  background:#1b1f26 !important;
  color:#fff !important;
}
a[data-link], [data-link]{ cursor:pointer; }
</style></head>
<body id="top">
<header><div class="header-inner">
  <div class="badge">Catalog</div>
  <div style="font-weight:700;letter-spacing:.2px;">3D Models – Category / Subcategory</div>
  <div class="kpi"><span>Total items: <strong id="kpiTotal">14,268</strong></span><span>Shown: <strong id="kpiShown">0</strong></span></div>
</div></header>

<div class="wrap">
  <aside class="panel sidebar"><div class="inner">
    <div class="search"><span style="color:var(--muted);font-size:12px;">Search</span><input id="q" type="text" placeholder="title contains..." /></div>
    <div class="selects"><select id="catSel"></select><select id="subSel"></select></div>
    <div class="toc"><h3>Table of contents</h3><div id="toc"></div></div>
    <div class="meta" style="margin-top:10px;">Tip: Click a TOC subcategory to jump + filter.</div>
  </div></aside>

  <main class="panel main"><div class="inner">
    <div class="controls"><div class="left"><button class="btn" id="clearBtn">Clear filters</button><button class="btn" id="printBtn">Print / Save as PDF</button></div><div class="meta" id="metaLine"></div></div>
    <div id="sectionHeader" style="margin-bottom:10px;"></div>
    <div class="grid" id="grid"></div>
    <div class="pager"><button class="btn" id="prevBtn">Prev</button><span class="meta">Page</span><input id="pageBox" type="number" min="1" value="1"/><span class="meta" id="pageInfo"></span><button class="btn" id="nextBtn">Next</button></div>
    <div class="meta" style="margin-top:10px;">This build only has Drive links for some items so far (your batch imports). Items without a Drive link show “No zip link yet”.</div>
  </div></main>
</div>

<script>
let DATA = null;
async function loadData(){
  const grid = document.getElementById('grid');
  if(grid){ grid.innerHTML = '<div style="padding:16px;color:#cbd5e1">Loading catalog…</div>'; }
  try{
    const res = await fetch('./data.json', {cache:'no-store'});
    DATA = await res.json();
    buildSelectors();
    buildTOC();
    state.page=1;
    render();
    }catch(e){
    console.error(e);
    document.getElementById('grid').innerHTML = '<div style="padding:16px;color:#cbd5e1">Failed to load data.json. Make sure data.json is in the same folder as this HTML file.</div>';
  }
}
const els = {
  q: document.getElementById('q'), catSel: document.getElementById('catSel'), subSel: document.getElementById('subSel'),
  toc: document.getElementById('toc'), grid: document.getElementById('grid'),
  kpiShown: document.getElementById('kpiShown'), metaLine: document.getElementById('metaLine'),
  sectionHeader: document.getElementById('sectionHeader'), pageBox: document.getElementById('pageBox'),
  pageInfo: document.getElementById('pageInfo'), prevBtn: document.getElementById('prevBtn'), nextBtn: document.getElementById('nextBtn'),
  clearBtn: document.getElementById('clearBtn'), printBtn: document.getElementById('printBtn'),
};
let state = { q:'', cat:'All', sub:'All', page:1, perPage:60 };
function uniq(arr){ return [...new Set(arr)]; }
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");}
function escAttr(s){return esc(s).replaceAll('`','&#096;');}

function buildSelectors(){
  const cats=['All', ...DATA.categories.map(c=>c.name)];
  els.catSel.innerHTML=cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  els.catSel.value=state.cat;
  rebuildSubSelector();
}
function rebuildSubSelector(){
  let subs=['All'];
  if(state.cat==='All'){
    const all=[]; for(const c of DATA.categories) for(const s of c.subs) all.push(s.name);
    subs=['All', ...uniq(all).sort((a,b)=>a.localeCompare(b))];
  } else {
    const catObj=DATA.categories.find(c=>c.name===state.cat);
    subs=['All', ...(catObj?catObj.subs.map(s=>s.name):[])];
  }
  els.subSel.innerHTML=subs.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  els.subSel.value=state.sub;
}
function buildTOC(){
  els.toc.innerHTML='';
  for(const c of DATA.categories){
    const catBox=document.createElement('div'); catBox.className='cat';
    const btn=document.createElement('button');
    btn.innerHTML=`<span>${esc(c.name)}</span><span class="pill">${c.count.toLocaleString()}</span>`;
    btn.addEventListener('click',()=>{
      const subs=catBox.querySelector('.subs');
      subs.style.display=(subs.style.display==='block')?'none':'block';
    });
    const subsDiv=document.createElement('div'); subsDiv.className='subs';
    subsDiv.innerHTML=c.subs.map(s=>`
      <a href="#top" data-cat="${esc(c.name)}" data-sub="${esc(s.name)}">
        <span>${esc(s.name)}</span><span class="pill">${s.count.toLocaleString()}</span>
      </a>`).join('');
    subsDiv.querySelectorAll('a').forEach(a=>{
      a.addEventListener('click',(e)=>{
        e.preventDefault();
        state.cat=a.getAttribute('data-cat'); state.sub=a.getAttribute('data-sub'); state.page=1;
        els.catSel.value=state.cat; rebuildSubSelector(); els.subSel.value=state.sub; render();
        window.scrollTo({top:0, behavior:'smooth'});
      });
    });
    catBox.appendChild(btn); catBox.appendChild(subsDiv); els.toc.appendChild(catBox);
  }
}
function getFilteredItems(){
  const q=state.q.trim().toLowerCase();
  let out=[];
  for(const c of DATA.categories){
    if(state.cat!=='All' && c.name!==state.cat) continue;
    for(const s of c.subs){
      if(state.sub!=='All' && s.name!==state.sub) continue;
      for(const it of s.items){
        if(q && !it.t.toLowerCase().includes(q)) continue;
        out.push(it);
      }
    }
  }
  return out;
}
function openDrive(url){
  if(!url) return;
  window.open(url, '_blank', 'noopener');
}
function render(){
  const items=getFilteredItems();
  els.kpiShown.textContent=items.length.toLocaleString();
  const pages=Math.max(1, Math.ceil(items.length/state.perPage));
  state.page=Math.min(Math.max(state.page,1),pages);
  els.pageBox.value=state.page;
  els.pageInfo.textContent=`of ${pages} (/${state.perPage} per page)`;

  const start=(state.page-1)*state.perPage;
  const pageItems=items.slice(start, start+state.perPage);

  const catLabel=(state.cat==='All')?'All categories':state.cat;
  const subLabel=(state.sub==='All')?'All subcategories':state.sub;
  els.metaLine.textContent=`${catLabel} • ${subLabel}`;

  els.sectionHeader.innerHTML=`
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;">
      <div><div style="font-size:18px;font-weight:800;">${esc(catLabel)}</div><div class="meta">${esc(subLabel)}</div></div>
      <div class="meta">${items.length.toLocaleString()} items</div>
    </div>`;

  els.grid.innerHTML=pageItems.map(it=>{
    const imgs=Array.isArray(it.imgs)?it.imgs:[];
    const hasMany=imgs.length>1;
    const first=imgs[0]||'';
    const link = (it.drive || it.dl || '');
    const hasLink = !!(link && link.length>0);
    const titleHtml = hasLink
      ? `<a href="javascript:void(0)" data-link="${escAttr(link)}" class="dlTitle">${esc(it.t)}</a>`
      : `<span>${esc(it.t)}</span>`;
    const statusTag = hasLink ? `<span class="tag">ZIP</span>` : `<span class="tag">No zip link yet</span>`;
    return `
      <div class="card" data-imgs='${escAttr(JSON.stringify(imgs))}' data-pos="0">
        <div class="thumb ${hasLink?'clickable':''}" ${
          hasLink ? `data-link="${escAttr(link)}"` : ''
        }>
          ${
            first ? `<img loading="lazy" src="${escAttr(first)}" alt="${escAttr(it.t)}" onerror="this.style.display='none'; this.parentNode.querySelector('.fallback').style.display='flex';"/>` : ''
          }
          <div class="fallback" style="display:${first ? 'none':'flex'};">No image</div>
          ${
            hasMany ? `
              <div class="navBtn navPrev" role="button" aria-label="Previous image" data-nav="-1">&#10094;</div>
              <div class="navBtn navNext" role="button" aria-label="Next image" data-nav="1">&#10095;</div>
              <div class="counter"><span class="pos">1</span>/${imgs.length}</div>
            ` : ''
          }
        </div>
        <div class="body">
          <div class="title">${titleHtml}</div>
          <div class="small"><span>${esc(it.cat)}</span><span>${esc(it.sub)}</span></div>
          <div>${statusTag}</div>
        </div>
      </div>`;
  }).join('');

  // carousel + click bindings
  els.grid.querySelectorAll('.card').forEach(card=>{
    const imgs=JSON.parse(card.getAttribute('data-imgs')||'[]');
    const imgEl=card.querySelector('img');
    const fallback=card.querySelector('.fallback');
    const thumb=card.querySelector('.thumb');
    const dl=thumb ? thumb.getAttribute('data-link') : '';

    if(thumb && dl) {
      thumb.addEventListener('click', (e)=>{
        // don't trigger on arrow clicks
        if(e.target && e.target.getAttribute && e.target.getAttribute('data-nav')) return;
        openDrive(dl);
      });
    }
    card.querySelectorAll('.dlTitle').forEach(a=>{
      a.addEventListener('click', (e)=>{
        e.preventDefault();
        const u=a.getAttribute('data-link');
        openDrive(u);
      });
    });

    if(imgs && imgs.length>1){
      const posEl=card.querySelector('.counter .pos');
      function setImg(pos){
        const safe=((pos%imgs.length)+imgs.length)%imgs.length;
        card.setAttribute('data-pos', String(safe));
        if(posEl) posEl.textContent=String(safe+1);
        const url=imgs[safe]||'';
        if(!url || !imgEl) return;
        fallback.style.display='none'; imgEl.style.display='block'; imgEl.src=url;
      }
      card.querySelectorAll('[data-nav]').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
          e.preventDefault(); e.stopPropagation();
          const dir=parseInt(btn.getAttribute('data-nav'),10)||0;
          const cur=parseInt(card.getAttribute('data-pos')||'0',10)||0;
          setImg(cur+dir);
        });
      });
      if(imgEl) imgEl.addEventListener('error',()=>{ imgEl.style.display='none'; fallback.style.display='flex'; });
    }
  });

  els.prevBtn.disabled=(state.page<=1);
  els.nextBtn.disabled=(state.page>=pages);
}

els.q.addEventListener('input',()=>{state.q=els.q.value; state.page=1; render();});
els.catSel.addEventListener('change',()=>{state.cat=els.catSel.value; state.sub='All'; state.page=1; rebuildSubSelector(); render();});
els.subSel.addEventListener('change',()=>{state.sub=els.subSel.value; state.page=1; render();});
els.pageBox.addEventListener('change',()=>{state.page=parseInt(els.pageBox.value||'1',10)||1; render();});
els.prevBtn.addEventListener('click',()=>{state.page-=1; render(); window.scrollTo({top:0,behavior:'smooth'});});
els.nextBtn.addEventListener('click',()=>{state.page+=1; render(); window.scrollTo({top:0,behavior:'smooth'});});
els.clearBtn.addEventListener('click',()=>{state={...state,q:'',cat:'All',sub:'All',page:1}; els.q.value=''; els.catSel.value='All'; rebuildSubSelector(); els.subSel.value='All'; render(); window.scrollTo({top:0,behavior:'smooth'});});
els.printBtn.addEventListener('click',()=>window.print());

loadData();
</script>
</body></html>
